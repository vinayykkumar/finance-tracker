{{- if and .Values.secret.create (not .Values.secret.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "finance-tracker.secretName" . }}
  labels:
    {{- include "finance-tracker.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ required "secret.data.SECRET_KEY is required (or set secret.existingSecret)" .Values.secret.data.SECRET_KEY | quote }}
  DATABASE_URL: {{ required "secret.data.DATABASE_URL is required (or set secret.existingSecret)" .Values.secret.data.DATABASE_URL | quote }}
{{- end }}
