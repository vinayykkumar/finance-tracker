apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "finance-tracker.fullname" . }}-api
  labels:
    {{- include "finance-tracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "finance-tracker.selectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "finance-tracker.selectorLabels" (dict "root" . "component" "api") | nindent 8 }}
      annotations:
        # Roll pods when config/secret content changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.api.env.METRICS_ENABLED }}
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ .Values.api.containerPort | quote }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "finance-tracker.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: {{ include "finance-tracker.apiImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.api.containerPort }}
          envFrom:
            - configMapRef:
                name: {{ include "finance-tracker.fullname" . }}-api
            - secretRef:
                name: {{ include "finance-tracker.secretName" . }}
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /v1/health/live
              port: http
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
