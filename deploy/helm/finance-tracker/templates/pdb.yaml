{{- if .Values.api.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "finance-tracker.fullname" . }}-api
  labels:
    {{- include "finance-tracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  minAvailable: {{ .Values.api.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "finance-tracker.selectorLabels" (dict "root" . "component" "api") | nindent 6 }}
{{- end }}
{{- if .Values.web.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "finance-tracker.fullname" . }}-web
  labels:
    {{- include "finance-tracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  minAvailable: {{ .Values.web.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "finance-tracker.selectorLabels" (dict "root" . "component" "web") | nindent 6 }}
{{- end }}
