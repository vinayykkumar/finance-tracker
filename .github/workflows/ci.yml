name: CI

# Manual-only: run from the Actions tab (or `gh workflow run CI`). Not triggered
# automatically on push/PR.
on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Web (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint -w finance-tracking-app
      - run: npm run test:coverage -w finance-tracking-app
      - run: npm run build -w finance-tracking-app
      - name: Upload web coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: fin-front/coverage
          if-no-files-found: ignore

  mobile:
    name: Mobile (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck -w fin-mobile

  backend:
    name: API (ruff, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fin-backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finance
          POSTGRES_PASSWORD: finance
          POSTGRES_DB: finance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance -d finance"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+asyncpg://finance:finance@localhost:5432/finance
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: fin-backend/.venv
          key: poetry-${{ hashFiles('fin-backend/poetry.lock') }}
      - run: pip install "poetry==2.1.1"
      - run: poetry config virtualenvs.in-project true
      - run: poetry install --with dev --no-interaction
      - run: poetry run ruff check app tests
      - name: Apply database migrations
        run: poetry run alembic upgrade head
      - run: poetry run pytest --cov-report=xml
      - name: Verify committed OpenAPI schema is up to date
        run: |
          poetry run python scripts/export_openapi.py /tmp/openapi.json
          diff -u ../fin-front/src/lib/api/openapi.json /tmp/openapi.json \
            || (echo "::error::OpenAPI schema is stale — run 'poetry run python scripts/export_openapi.py' and commit." && exit 1)
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: fin-backend/coverage.xml
          if-no-files-found: ignore

  docker:
    name: Docker Compose (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: docker compose build
        run: docker compose -f docker-compose.yml build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Boot full stack
        run: docker compose -f docker-compose.yml up --build -d
      - name: Apply database migrations
        run: docker compose run --rm api poetry run alembic upgrade head
      - name: Wait for web to be reachable
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080 >/dev/null 2>&1; then
              echo "web is up"; exit 0
            fi
            sleep 2
          done
          echo "::error::web service did not become reachable"; exit 1
      - name: Install Playwright browser
        run: npm run test:e2e:install -w finance-tracking-app
      - name: Run E2E tests
        env:
          E2E_BASE_URL: http://localhost:8080
        run: npm run test:e2e -w finance-tracking-app
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: fin-front/playwright-report
          if-no-files-found: ignore
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --no-color
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v
