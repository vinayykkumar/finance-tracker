name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Web (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint -w finance-tracking-app
      - run: npm run test -w finance-tracking-app
      - run: npm run build -w finance-tracking-app

  mobile:
    name: Mobile (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck -w fin-mobile

  backend:
    name: API (ruff, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fin-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: fin-backend/.venv
          key: poetry-${{ hashFiles('fin-backend/poetry.lock') }}
      - run: pip install "poetry==2.1.1"
      - run: poetry config virtualenvs.in-project true
      - run: poetry install --with dev --no-interaction
      - run: poetry run ruff check app tests
      - run: poetry run pytest --cov-report=xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: fin-backend/coverage.xml
          if-no-files-found: ignore

  docker:
    name: Docker Compose (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: docker compose build
        run: docker compose -f docker-compose.yml build
